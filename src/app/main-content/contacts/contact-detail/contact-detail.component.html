<div class="contactInfo">
	<div class="iconName">
		<h1>Contacts</h1>
		<hr>
		<h2>Better with a team</h2>
	</div>

	<div class="contactDetail">
		<div class="contactIcon">
			<app-contact-icon class="{{ contact().iconColor }}" [contact]="contact()"></app-contact-icon>
		</div>

		<div class="editDelete">
			<p class="name">{{ contact().firstName }} {{ contact().lastName }}</p>

			<div class="iconMain">
				<button (click)="toggleEditContactModal()" type="button"><img src="assets/Icons/digitaler-controller.png" alt="" />Edit</button>
				<button><img class="deleteBtn" src="assets/Icons/—Pngtree—vector trash icon_4152654.png" alt="" />Delete</button>
			</div>
		</div>

		<div class="lastInfo">
			<h2>Contact Information</h2>

		<div class="emailPhone">
			<h3>Email</h3>
			<a href="mailto:{{ contact().email }}">{{ contact().email }}</a>
			<h3>Phone</h3>
			{{ contact().tel }}
		</div>
	</div>
	</div>
</div>

<aside id="editContactModal" class="editContactModalContainer {{ editModalState }}">

	<div class="leftSide">
		<img src="assets/Icons/JoinLogoWhite.png" alt=""/>
		<div class="lineCloseBtn d_none">
			<button type="button" (click)="toggleEditContactModal()">x</button>
		</div>
		<h1>Edit Contact</h1>
    </div>

    <div class="rightSide">
		<div class="lineCloseBtn">
			<button type="button" (click)="toggleEditContactModal()">x</button>
		</div>

		<div class="lineForm">
			<app-contact-icon class="{{ contact().iconColor }} singleIcon" [contact]="contact()"></app-contact-icon>

			<form action="submit" method="post">
				<input type="text" name="" id="" />
				<input type="email" name="" id="" />
				<input type="tel" name="" id="" />

			<div class="formBtnContainer">
				<button type="button" (click)="toggleEditContactModal()">Delete</button>
				<button type="button" (submit)="deleteContact()">Save ✓</button>
			</div>
			</form>
		</div>
    </div>
</aside>
